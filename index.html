<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oráculo Celestial — Academia de los Mil Imperios</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #f0d080; --gold-dim: #7a6030;
    --ash: #8a7090; --divine: #e8d5b0; --blood: #8b1a1a;
    --moon: #b8c8e8; --shadow: #0d0a12;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--shadow); color:var(--divine); font-family:'EB Garamond',serif; min-height:100vh; overflow-x:hidden; }
  .starfield { position:fixed; inset:0; z-index:0; overflow:hidden; }
  .starfield::before, .starfield::after {
    content:''; position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(201,168,76,.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 75%, rgba(184,200,232,.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 15% 60%, rgba(201,168,76,.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 15%, rgba(184,200,232,.6) 0%, transparent 100%);
    background-size:400px 400px; animation:twinkle 8s ease-in-out infinite alternate;
  }
  @keyframes twinkle { 0%{opacity:.6;} 100%{opacity:1;} }
  .nebula { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse at 50% 50%, rgba(100,30,120,.1) 0%, transparent 80%); }
  .page { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; padding:2rem 1rem; }
  header { text-align:center; padding-bottom:2rem; }
  header h1 { font-family:'Cinzel Decorative',serif; font-size:2.4rem; background:linear-gradient(135deg,var(--gold-dim),var(--gold-light),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .houses-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:.7rem; width:100%; max-width:800px; margin-bottom:2rem; }
  .house-card { background:rgba(255,255,255,.02); border:1px solid rgba(201,168,76,.15); border-radius:4px; padding:.9rem .6rem; cursor:pointer; text-align:center; transition:.3s; }
  .house-card:hover, .house-card.active { border-color:var(--house-color); box-shadow:0 0 15px rgba(var(--house-rgb),.2); }
  .house-card.active { background:rgba(var(--house-rgb),.1); }
  .house-icon { font-size:1.5rem; display:block; }
  .house-name { font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.1em; color:var(--house-color); text-transform:uppercase; }
  .house-apolo { --house-color:#f5c842; --house-rgb:245,200,66; }
  .house-artemisa { --house-color:#b8c8e8; --house-rgb:184,200,232; }
  .house-ares { --house-color:#c0392b; --house-rgb:192,57,43; }
  .house-afrodita { --house-color:#e8a0b8; --house-rgb:232,160,184; }
  .house-atenea { --house-color:#5db8d4; --house-rgb:93,184,212; }
  .house-zeus { --house-color:#a080e0; --house-rgb:160,128,224; }
  .house-hades { --house-color:#7a5fa0; --house-rgb:122,95,160; }
  .oracle-frame { width:100%; max-width:680px; border:1px solid rgba(201,168,76,.2); background:rgba(10,6,8,.8); backdrop-filter:blur(10px); border-radius:8px; padding:2rem; }
  textarea, select { width:100%; background:rgba(255,255,255,.03); border:1px solid rgba(201,168,76,.2); color:var(--divine); padding:1rem; margin-bottom:1rem; border-radius:4px; font-family:inherit; }
  .btn-invoke { width:100%; padding:1rem; background:transparent; border:1px solid var(--gold); color:var(--gold); font-family:'Cinzel',serif; cursor:pointer; letter-spacing:2px; transition:.3s; }
  .btn-invoke:hover:not(:disabled) { background:var(--gold); color:var(--shadow); box-shadow:0 0 20px var(--gold); }
  .loading-veil { display:none; text-align:center; padding:1rem; }
  .result-area { margin-top:2rem; display:none; border-top:1px solid rgba(201,168,76,.1); padding-top:1rem; }
  .oracle-text { font-size:1.1rem; line-height:1.7; font-style:italic; color:var(--divine); margin-bottom:1.5rem; text-align:justify; }
  .decree-box { background:rgba(201,168,76,.05); border:1px solid var(--gold-dim); padding:1rem; border-radius:4px; }
  .decree-label { font-family:'Cinzel',serif; font-size:.6rem; color:var(--gold); margin-bottom:.5rem; }
  footer { margin-top:3rem; opacity:.4; font-size:.7rem; text-align:center; }
</style>
</head>
<body>
<div class="starfield"></div><div class="nebula"></div>
<div class="page">
  <header>
    <h1>Oráculo Celestial</h1>
    <p style="letter-spacing:3px; color:var(--ash); font-size:.8rem">SISTEMA DE PREDICCIÓN ALGORÍTMICA</p>
  </header>

  <div class="houses-grid">
    <div class="house-card house-apolo" data-god="Apolo" data-icon="☀️" onclick="selectHouse(this)">
      <span class="house-icon">☀️</span><span class="house-name">Heliadoris</span>
    </div>
    <div class="house-card house-artemisa" data-god="Artemisa" data-icon="🌙" onclick="selectHouse(this)">
      <span class="house-icon">🌙</span><span class="house-name">Tsukiyomi</span>
    </div>
    <div class="house-card house-ares" data-god="Ares" data-icon="⚔️" onclick="selectHouse(this)">
      <span class="house-icon">⚔️</span><span class="house-name">Valkyron</span>
    </div>
    <div class="house-card house-afrodita" data-god="Afrodita" data-icon="🕊️" onclick="selectHouse(this)">
      <span class="house-icon">🕊️</span><span class="house-name">Eryssia</span>
    </div>
    <div class="house-card house-atenea" data-god="Atenea" data-icon="🧠" onclick="selectHouse(this)">
      <span class="house-icon">🧠</span><span class="house-name">Noctyra</span>
    </div>
    <div class="house-card house-zeus" data-god="Zeus" data-icon="⚡" onclick="selectHouse(this)">
      <span class="house-icon">⚡</span><span class="house-name">Imperion</span>
    </div>
    <div class="house-card house-hades" data-god="Hades" data-icon="🔥" onclick="selectHouse(this)">
      <span class="house-icon">🔥</span><span class="house-name">Umbra Mortis</span>
    </div>
  </div>

  <div class="oracle-frame">
    <textarea id="userInput" placeholder="Describe tu situación o dilema aquí..."></textarea>
    <select id="userClass">
      <option>Alta Nobleza</option><option>Nobleza Media</option><option>Plebeyo</option><option>Sirviente</option>
    </select>
    <button class="btn-invoke" id="invokeBtn" onclick="invoke()" disabled>✦ SELECCIONA UNA CASA ✦</button>

    <div id="loading" class="loading-veil">Procesando hilos del destino...</div>

    <div id="result" class="result-area">
      <div id="godTitle" style="font-family:'Cinzel',serif; color:var(--gold); margin-bottom:1rem"></div>
      <div class="oracle-text" id="oracleText"></div>
      <div class="decree-box">
        <div class="decree-label">SENTENCIA DIVINA</div>
        <div id="decreeText"></div>
      </div>
    </div>
  </div>

  <footer>ACADEMIA DE LOS MIL IMPERIOS © 2026</footer>
</div>

<script>
  let selected = null;
  function selectHouse(el) {
    document.querySelectorAll('.house-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    selected = { god: el.dataset.god, icon: el.dataset.icon };
    document.getElementById('invokeBtn').disabled = false;
    document.getElementById('invokeBtn').innerText = "✦ INVOCAR A " + selected.god.toUpperCase() + " ✦";
  }

  function invoke() {
    const input = document.getElementById('userInput').value;
    const rank = document.getElementById('userClass').value;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';

    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';
      document.getElementById('godTitle').innerText = `${selected.icon} Mensaje de ${selected.god}`;

      const r = (arr) => arr[Math.floor(Math.random() * arr.length)];

      const aperturas = [
        `Analizando las frecuencias astrales para un ${rank}...`,
        `Las crónicas de la Academia revelan una perturbación en tu hilo de vida.`,
        `Como deidad de esta casa, mi sabiduría trasciende tu limitada percepción mortal.`,
        `He procesado tu consulta y los resultados son inquietantes para la clase ${rank}.`
      ];

      const analisis = [
        `Tu dilema sobre "${input || 'el vacío'}" no es más que una pieza en un juego de ajedrez celestial mucho más grande.`,
        `La energía que emana de tu petición indica que has estado ignorando las señales que puse en tu camino.`,
        `Observo que tus intenciones están nubladas por el miedo, algo impropio de alguien con tus aspiraciones.`,
        `El tejido de la realidad se debilita cuando un ${rank} se atreve a cuestionar lo inevitable.`
      ];

      const misiones = [
        `Por lo tanto, se te encomienda la tarea de purificar los altares antiguos antes de que el eclipse de sangre consuma tu linaje.`,
        `Tu única salida es infiltrarte en el consejo secreto y descubrir quién ha estado filtrando tus secretos a las casas enemigas.`,
        `Debes buscar el manuscrito prohibido oculto bajo la biblioteca central, pero cuidado: el conocimiento tiene un precio que tu alma no puede pagar.`,
        `Te ordeno que protejas al heredero caído de la Casa rival; solo a través de la traición encontrarás tu verdadera redención.`
      ];

      const profecias = [
        `Si fallas, las consecuencias resonarán durante mil años en los pasillos de esta Academia.`,
        `Veo un futuro donde tu nombre es recordado como una leyenda... o como una advertencia escrita en cenizas.`,
        `No olvides que el poder que buscas es el mismo que terminará por consumirte si no controlas tus impulsos.`,
        `Las estrellas indican que tu sacrificio será necesario para mantener el equilibrio entre los dioses y los mortales.`
      ];

      const cierres = [
        `La sesión del oráculo ha terminado. No vuelvas a buscarme hasta que hayas cumplido con tu parte.`,
        `Mi voluntad ha sido dictada. Que el cosmos guíe tus pasos, o que las sombras te reclamen.`,
        `Vete ahora, mortal. Los hilos del destino ya han comenzado a moverse por tu causa.`,
        `El silencio es ahora tu único aliado. Úsalo sabiamente en las próximas horas.`
      ];

      document.getElementById('oracleText').innerText = `${r(aperturas)} ${r(analisis)} ${r(misiones)} ${r(profecias)} ${r(cierres)}`;
      document.getElementById('decreeText').innerText = `ORDEN SUPERIOR: Se ha emitido un decreto de nivel ${Math.floor(Math.random()*10)}. Proceder con cautela absoluta.`;
    }, 1500);
  }
</script>
</body>
</html>
